<script>
window.addEventListener('error',function(e){
  var el=document.getElementById('root');
  if(el&&!el.hasChildNodes()){
    el.innerHTML='<div style="padding:32px;font-family:sans-serif;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc"><p style="color:#64748b;font-size:14px;margin:0 0 16px">Erro ao iniciar o app</p><button onclick="location.reload()" style="background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">Recarregar</button></div>';
  }
});
setTimeout(function(){
  var el=document.getElementById('root');
  if(el&&!el.hasChildNodes()){
    el.innerHTML='<div style="padding:32px;font-family:sans-serif;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc"><p style="color:#64748b;font-size:14px;margin:0 0 16px">Carregando...</p><button onclick="location.reload()" style="background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">Recarregar</button></div>';
  }
},15000);
</script>
<script>
// Catch any uncaught errors and show them instead of white screen
window.addEventListener('error', function(e){
  var el = document.getElementById('root');
  if(el && el.innerHTML === '') {
    el.innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#dc2626;background:#fff;min-height:100vh">' +
      '<h2 style="margin:0 0 12px">Erro ao carregar</h2>' +
      '<p style="font-size:13px;color:#666;margin:0 0 16px">' + (e.message||'Erro desconhecido') + '</p>' +
      '<button onclick="location.reload()" style="background:#2563eb;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer">Tentar novamente</button>' +
      '</div>';
  }
});
// Timeout fallback — if root is empty after 12s, show retry
setTimeout(function(){
  var el = document.getElementById('root');
  if(el && el.innerHTML === '') {
    el.innerHTML = '<div style="padding:24px;font-family:sans-serif;text-align:center;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f8fafc">' +
      '<p style="color:#64748b;font-size:14px;margin:0 0 16px">Demorou mais que o esperado...</p>' +
      '<button onclick="location.reload()" style="background:#2563eb;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600">Recarregar</button>' +
      '</div>';
  }
}, 12000);
</script>

<style>
:root{
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --sidebar:#0F172A;
  --sidebar-hover:#1E293B;
  --sidebar-active:#2563EB;
  --border:#E2E8F0;
  --text:#0F172A;
  --text2:#64748B;
  --text3:#94A3B8;
  --primary:#2563EB;
  --primary-light:#EFF6FF;
  --success:#16A34A;
  --success-light:#F0FDF4;
  --warning:#EA580C;
  --warning-light:#FFF7ED;
  --danger:#DC2626;
  --danger-light:#FEF2F2;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --radius:8px;
  --radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--border)}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94A3B8}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:none;opacity:0.5}
select option{background:var(--card)}
h1,h2,h3,h4{font-family:'Sora',sans-serif;color:var(--text)}
input,select,textarea{color:var(--text)!important}
input::placeholder,textarea::placeholder{color:var(--text3)}
.sf-btn{transition:background .12s,opacity .12s}
.sf-btn-primary:hover{background:var(--primary-dark)!important}
.sf-btn-ghost:hover{background:#F1F5F9!important}
.sf-btn-danger:hover{background:#B91C1C!important}
.sf-btn-success:hover{background:#F0FDF4!important}
.sf-btn:disabled{opacity:.5;cursor:not-allowed}
</style>

// Cloud storage — salva/carrega dados do Supabase por tipo
const cloudSave = async (userId, tipo, dados) => {
  const {error} = await sb.from("sf_dados").upsert(
    {user_id: userId, tipo, dados, updated_at: new Date().toISOString()},
    {onConflict: "user_id,tipo"}
  );
  if(error) console.error("Erro ao salvar:", error);
};
const cloudLoad = async (userId, tipo) => {
  try{
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),8000));
    const query=sb.from("sf_dados").select("dados").eq("user_id",userId).eq("tipo",tipo).single();
    const {data,error} = await Promise.race([query,timeout]);
    if(error || !data) return null;
    return data.dados;
  }catch{ return null; }
};

};
const loadInteracoes=async(userId,adminId)=>{
  return await crossLoad(userId,`treino_interacoes_${adminId}`)||{};
};

const pedirPermissaoNotificacao=async()=>{
  if(!("Notification" in window))return false;
  if(Notification.permission==="granted")return true;
  try{
    const r=await Notification.requestPermission();
    if(r==="granted"){
      // Resetar "primeiro acesso" para que eventos atuais sejam notificados
      // mas NÃO resetar "vistos" para não re-notificar tudo
    }
    return r==="granted";
  }catch(e){
    return new Promise(resolve=>Notification.requestPermission(r=>resolve(r==="granted")));
  }
};
const dispararNotificacao=(titulo,corpo,tag)=>{
  if(Notification.permission!=="granted")return;
  // Safari iOS: notificações diretas apenas (não suporta SW Blob)
  const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  if(!isSafari&&window.sfNotify){window.sfNotify(titulo,corpo,tag);return;}
  try{new Notification(titulo,{body:corpo,tag:tag||undefined});}
  catch(e){console.log("[ScalaFest] Notificação:",titulo);}
};
const crossLoad = async (userId, tipo) => {
  try {
    const {data,error} = await sb.from("sf_dados").select("dados").eq("user_id",userId).eq("tipo",tipo).single();
    if(error || !data) return null;
    return data.dados;
  } catch { return null; }
};

const BONUS_INIT = [
  {id:"junior", label:"Júnior", valor:5,  cor:"#3b82f6"},
  {id:"senior", label:"Sênior", valor:10, cor:"#a855f7"},
  {id:"master", label:"Master", valor:20, cor:"#f59e0b"},
];
// Referência global — atualizada pelo App para que calcCache funcione sem prop drilling
let NIVEIS_BONUS = [...BONUS_INIT];
const toMin = h => { if(!h) return 0; const[hh,mm]=h.split(":"); return +hh*60+(+mm||0); };
const duracaoEvento = ev => {
  if(!ev?.horaInicio||!ev?.horaFim) return 0;
  return toMin(ev.horaFim) - toMin(ev.horaInicio);
};
// Calcula cachê total (base + bonificação se ativa)
const calcCache = (membro, ev) => {
  const base = membro.cache || 0;
  const bonus = membro.bonus;
  if(!bonus?.ativo) return base;
  const nivel = NIVEIS_BONUS.find(n => n.id === bonus.nivel);
  return base + (nivel?.valor || 0);
};

// ── TELA DE LOGIN ──────────────────────────────────────────────────────────────
function TelaLogin({onLogin}){
  const[email,setEmail]=useState("");
  const[senha,setSenha]=useState("");
  const[modo,setModo]=useState("login"); // login | cadastro | esqueci
  const[loading,setLoading]=useState(false);
  const[msg,setMsg]=useState(null); // {tipo:"erro"|"ok", texto}

  const handleEmail = async e => {
    e.preventDefault();
    setLoading(true); setMsg(null);
    if(modo==="esqueci"){
      const {error} = await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
      setMsg(error?{tipo:"erro",texto:error.message}:{tipo:"ok",texto:"E-mail de recuperação enviado! Verifique sua caixa de entrada."});
      setLoading(false); return;
    }
    const fn = modo==="cadastro" ? sb.auth.signUp.bind(sb.auth) : sb.auth.signInWithPassword.bind(sb.auth);
    const {data,error} = await fn({email,password:senha});
    if(error) setMsg({tipo:"erro",texto:error.message==="Invalid login credentials"?"E-mail ou senha incorretos.":error.message});
    else if(modo==="cadastro"&&!data.session) setMsg({tipo:"ok",texto:"Conta criada! Verifique seu e-mail para confirmar."});
    else if(data.session) onLogin(data.session.user);
    setLoading(false);
  };

  const handleGoogle = async () => {
    setLoading(true);
    const {error} = await sb.auth.signInWithOAuth({provider:"google",options:{redirectTo:window.location.href}});
    if(error){setMsg({tipo:"erro",texto:error.message});setLoading(false);}
  };

  return(
    <div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:10}}>
            <img src={LOGO_URL} alt="EscalaFest" style={{height:60,objectFit:"contain",filter:"brightness(0) saturate(100%) invert(31%) sepia(98%) saturate(1352%) hue-rotate(207deg) brightness(97%) contrast(95%)"}}/>
          </div>

    </div>

}

const fmtDate=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const initials=n=>n.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
const avatarColor=n=>{const c=["var(--warning)","#3b82f6","#a855f7","var(--success)","#ec4899","#f97316","var(--primary)","#14b8a6","var(--danger)"];let h=0;for(let x of n)h=(h*31+x.charCodeAt(0))%c.length;return c[h];};
const limparTel=t=>t?t.replace(/\D/g,""):"";
const toGCal=(data,hora)=>{const[y,m,d]=data.split("-");const[hh,mm]=(hora||"00:00").split(":");return`${y}${m}${d}T${hh}${mm}00`;};
const waEscala=(f,ev,m)=>{const t=limparTel(f.telefone);if(!t)return null;const msg=`Olá, *${f.nome}*! 👋\n\nVocê foi escalado(a) para:\n\n🎪 *${ev.nome}*\n📅 ${fmtDate(ev.data)}\n⏰ ${ev.horaInicio} — ${ev.horaFim}\n📍 ${ev.local}\n🎭 Função: *${m.funcao}*\n💰 Cachê: *R$ ${m.cache.toFixed(2).replace(".",",")}*\n\nConfirme sua presença! 🙏`;return`https://wa.me/55${t}?text=${encodeURIComponent(msg)}`;};
const waPag=(f,ev,m)=>{const t=limparTel(f.telefone);if(!t)return null;const msg=`Olá, *${f.nome}*! 👋\n\nPagamento pendente:\n\n🎪 *${ev.nome}*\n📅 ${fmtDate(ev.data)}\n💰 R$ ${m.cache.toFixed(2).replace(".",",")}${f.pix?`\n\n💳 PIX: *${f.pix}*`:""}\n\nObrigado! ✅`;return`https://wa.me/55${t}?text=${encodeURIComponent(msg)}`;};

const Btn=({children,variant="primary",small,...p})=>{

    primary:{background:"#2563EB",color:"#fff",border:"none"},

};

function AbaFuncoes({funcoes,setFuncoes}){
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[confirmar,setConfirmar]=useState(null);
  const salvar=()=>{if(!form.nome)return;if(form.id)setFuncoes(f=>f.map(x=>x.id===form.id?{...form}:x));else setFuncoes(f=>[...f,{...form,id:Date.now()}]);setModal(false);};
  const excluir=id=>{setFuncoes(f=>f.filter(x=>x.id!==id));setConfirmar(null);};
  return(
    <div style={{padding:"24px 28px",flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12,paddingBottom:20,borderBottom:"1px solid var(--border)"}}>

        <Btn onClick={()=>{setForm({nome:"",cor:"var(--primary)",cacheDefault:0});setModal(true);}}>+ Nova função</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14}}>
        {funcoes.map(fn=>(
          <Card key={fn.id}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
              <div style={{width:40,height:40,borderRadius:8,background:fn.cor+"18",border:`1px solid ${fn.cor}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:12,height:12,borderRadius:"50%",background:fn.cor}}/></div>
              <div style={{flex:1}}><div style={{fontWeight:700,color:"var(--text)",fontSize:16}}>{fn.nome}</div><div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}><div style={{width:10,height:10,borderRadius:"50%",background:fn.cor}}/><span style={{fontSize:11,color:"var(--text3)"}}>{fn.cor}</span></div></div>
            </div>
            <div style={{background:"var(--bg)",borderRadius:8,padding:"9px 12px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid var(--border)"}}>
              <span style={{fontSize:12,color:"var(--text2)"}}>Cachê padrão</span>
              <span style={{fontSize:15,fontWeight:800,color:fn.cor}}>R$ {(fn.cacheDefault||0).toFixed(2).replace(".",",")}</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn small variant="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setForm({...fn});setModal(true);}}>Editar</Btn>
              <Btn small variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmar(fn)}>Excluir</Btn>
            </div>
          </Card>
        ))}

          <span style={{fontSize:22,color:"var(--text3)"}}>+</span>Nova função
        </button>
      </div>
      <Modal open={modal} onClose={()=>setModal(false)} title={form.id?"Editar Função":"Nova Função"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="Nome da Função" value={form.nome||""} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Ex: Mestre de Cerimônias"/>
          <Inp label="Cachê Padrão (R$)" type="number" value={form.cacheDefault||""} onChange={e=>setForm(f=>({...f,cacheDefault:+e.target.value}))} placeholder="0,00"/>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}}>Cor da Função</label>

              {CORES_PRESET.map(c=>(<button key={c} onClick={()=>setForm(f=>({...f,cor:c}))} style={{width:30,height:30,borderRadius:8,background:c,border:form.cor===c?"3px solid #fff":"2px solid transparent",cursor:"pointer"}}/>))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="color" value={form.cor||"var(--primary)"} onChange={e=>setForm(f=>({...f,cor:e.target.value}))} style={{width:42,height:38,borderRadius:8,border:"1px solid var(--border)",background:"var(--bg)",cursor:"pointer",padding:2}}/>
              <Inp value={form.cor||""} onChange={e=>setForm(f=>({...f,cor:e.target.value}))} placeholder="var(--primary)" style={{flex:1}}/>
            </div>
          </div>
          {form.nome&&(<div style={{background:"var(--bg)",borderRadius:10,padding:12,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:"var(--text2)"}}>Preview:</span>
            <Badge label={form.nome} color={form.cor||"var(--text3)"}/>
            {form.cacheDefault>0&&<span style={{fontSize:13,color:form.cor,fontWeight:700}}>R$ {(+form.cacheDefault).toFixed(2).replace(".",",")}</span>}
          </div>)}
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={salvar}>Salvar</Btn></div>
        </div>
      </Modal>
      <ConfirmDelete open={!!confirmar} onClose={()=>setConfirmar(null)} onConfirm={()=>excluir(confirmar.id)} titulo={`Excluir função "${confirmar?.nome}"?`} descricao="Esta função será removida. Eventos já escalados não serão afetados."/>
    </div>
  );
}




// ── ABA EVENTOS ────────────────────────────────────────────────────────────────
function AbaEventos({eventos,setEventos,freelancers,disponibilidade,funcoes}){
  const[modal,setModal]=useState(null);
  const[detalhe,setDetalhe]=useState(null);
  const[form,setForm]=useState({});
  const[mf,setMf]=useState({freelancerId:"",funcao:"",cache:""});
  const[filtro,setFiltro]=useState("");
  const[gcal,setGcal]=useState(null);
  const[conflito,setConflito]=useState(null);
  const[confirmar,setConfirmar]=useState(null);
  const fl=id=>freelancers.find(f=>f.id===id);
  const det=detalhe?eventos.find(e=>e.id===detalhe):null;
  useEffect(()=>{setMf(f=>({...f,freelancerId:"",cache:"",busca:""}));},[detalhe]);
  const fnCor=nome=>(funcoes.find(f=>f.nome===nome)||{}).cor||"var(--text3)";
  const fnDef=nome=>(funcoes.find(f=>f.nome===nome)||{}).cacheDefault||0;
  const setFnMembro=nome=>setMf(f=>({...f,funcao:nome,cache:fnDef(nome)>0?String(fnDef(nome)):f.cache}));
  useEffect(()=>{if(funcoes.length>0&&!mf.funcao)setMf(f=>({...f,funcao:funcoes[0].nome,cache:String(fnDef(funcoes[0].nome)||"")}));},[funcoes]);
  const checkDisp=(fid,ev)=>{
    if(!fid||!ev?.data)return null;
    const fidNum=+fid; // normaliza para número sempre
    const d=(disponibilidade[fidNum]||{})[ev.data];
    const hMin=h=>{if(!h)return null;const[hh,mm]=h.split(":");return+hh*60+(+mm||0);};
    const evIni=hMin(ev.horaInicio);const evFim=hMin(ev.horaFim);

    // Conflito de horário com outro evento (margem 1h)
    const conflitoEvento=eventos.find(e=>{
      if(e.id===ev.id||e.data!==ev.data)return false;
      if(!e.equipe.find(m=>m.freelancerId===fidNum))return false;
      if(!evIni||!evFim||!hMin(e.horaInicio)||!hMin(e.horaFim))return true;
      const eIni=hMin(e.horaInicio)-60;const eFim=hMin(e.horaFim)+60;
      return evIni<eFim&&evFim>eIni;
    });
    if(conflitoEvento){
      return{tipo:"conflito",msg:`Conflito com "${conflitoEvento.nome}" (${conflitoEvento.horaInicio}–${conflitoEvento.horaFim}) — margem de 1h`,cor:"var(--danger)"};
    }

    // Indisponível no dia
    if(d==="indisponivel")return{tipo:"indisponivel",msg:"Indisponível neste dia",cor:"var(--danger)"};

    // Disponibilidade parcial com comparação de horário
    if(d&&typeof d==="object"&&d.status==="parcial"){
      let alerta=null;
      if(evIni!=null&&evFim!=null){
        if(d.tipo==="apos"){const limMin=hMin(d.hora);if(limMin!=null&&evIni<limMin)alerta=`Disponível somente após ${d.hora} — evento começa às ${ev.horaInicio}`;}
        else if(d.tipo==="antes"){const limMin=hMin(d.hora);if(limMin!=null&&evFim>limMin)alerta=`Disponível somente até ${d.hora} — evento termina às ${ev.horaFim}`;}
        else if(d.tipo==="entre"){const ini=hMin(d.hora);const fim=hMin(d.hora2);if(ini!=null&&fim!=null&&(evIni<ini||evFim>fim))alerta=`Disponível somente entre ${d.hora}–${d.hora2}`;}
      }
      const label=d.tipo==="apos"?`Após ${d.hora}`:d.tipo==="antes"?`Até ${d.hora}`:d.tipo==="entre"?`${d.hora}–${d.hora2}`:d.obs||"Parcial";
      return{tipo:"parcial",msg:alerta||`Disponibilidade parcial: ${label}`,cor:"var(--warning)",bloqueio:!!alerta};
    }
    if(d==="parcial")return{tipo:"parcial",msg:"Disponibilidade parcial",cor:"var(--warning)"};
    if(d==="disponivel")return{tipo:"disponivel",msg:"Disponível ✓",cor:"var(--success)"};
    return{tipo:"sem_info",msg:"Não informado",cor:"var(--text3)"};
  };
  const salvar=()=>{if(!form.nome||!form.data)return;if(form.id)setEventos(ev=>ev.map(e=>e.id===form.id?{...e,...form}:e));else setEventos(ev=>[...ev,{...form,id:Date.now(),equipe:[]}]);setModal(null);};
  const excluir=id=>{setEventos(ev=>ev.filter(e=>e.id!==id));if(detalhe===id)setDetalhe(null);setConfirmar(null);};
  const addMembro=eid=>{
    if(!mf.freelancerId||!mf.funcao)return;
    const ev=eventos.find(e=>e.id===eid);
    const al=checkDisp(mf.freelancerId,ev);
    if(al&&(al.tipo==="indisponivel"||al.tipo==="conflito"||(al.tipo==="parcial"&&al.bloqueio))){
      const f=freelancers.find(x=>x.id===+mf.freelancerId);
      setConflito({...al,nome:f?.nome,onOk:()=>{
        const novoMembro=buildMembro(mf,ev);
        setEventos(evs=>evs.map(e=>e.id===eid?{...e,equipe:[...e.equipe,novoMembro]}:e));
        setMf(f=>({...f,freelancerId:"",cache:"",busca:""}));setConflito(null);
      }});return;
    }
    const novoMembro=buildMembro(mf,ev);
    setEventos(evs=>evs.map(e=>e.id===eid?{...e,equipe:[...e.equipe,novoMembro]}:e));
    setMf(f=>({...f,freelancerId:"",cache:"",busca:""}));
  };

  // Constrói objeto membro com bônus automático
  const buildMembro=(mf,ev)=>{
    const fl=freelancers.find(f=>f.id===+mf.freelancerId);
    const dur=duracaoEvento(ev);
    const nivelBonus=fl?.nivelBonus||null;
    const bonusAuto=dur>180&&!!nivelBonus; // >3h ativa automaticamente
    return {
      freelancerId:+mf.freelancerId,
      funcao:mf.funcao,
      cache:+mf.cache||0,
      pago:false,
      bonus:nivelBonus?{nivel:nivelBonus,ativo:bonusAuto}:null
    };
  };
  const togPago=(eid,idx)=>setEventos(ev=>ev.map(e=>e.id===eid?{...e,equipe:e.equipe.map((m,i)=>i===idx?{...m,pago:!m.pago}:m)}:e));
  const remMembro=(eid,idx)=>setEventos(ev=>ev.map(e=>e.id===eid?{...e,equipe:e.equipe.filter((_,i)=>i!==idx)}:e));
  const hoje=new Date().toISOString().slice(0,10);
  const evOrdenados=[...eventos].sort((a,b)=>{const d=a.data.localeCompare(b.data);return d!==0?d:a.horaInicio.localeCompare(b.horaInicio);});
  const evFuturos=evOrdenados.filter(e=>e.data>=hoje);
  const evPassados=evOrdenados.filter(e=>e.data<hoje).reverse(); // mais recentes primeiro
  const evFilt=evFuturos.filter(e=>e.nome.toLowerCase().includes(filtro.toLowerCase())||e.tipo.toLowerCase().includes(filtro.toLowerCase())||e.local?.toLowerCase().includes(filtro.toLowerCase()));
  const evPassFilt=evPassados.filter(e=>e.nome.toLowerCase().includes(filtro.toLowerCase())||e.tipo.toLowerCase().includes(filtro.toLowerCase())||e.local?.toLowerCase().includes(filtro.toLowerCase()));
  const[verPassados,setVerPassados]=useState(false);
  return(
    <div style={{padding:24,flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div><h2 style={{color:"var(--text)",margin:0,fontSize:18,fontWeight:700,letterSpacing:"-0.01em"}}>🎪 Eventos</h2><p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:12}}>{evFuturos.length} próximos · {evPassados.length} anteriores</p></div>
        <div style={{display:"flex",gap:10}}>
          <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="🔍 Buscar evento..." style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"8px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",minWidth:180}}/>
          <Btn onClick={()=>{setForm({nome:"",tipo:"Aniversário Infantil",data:"",horaInicio:"",horaFim:"",local:"",status:"Confirmado",obs:""});setModal("novo");}}>＋ Novo Evento</Btn>
        </div>
      </div>

      {/* Eventos futuros / atuais */}
      {evFilt.length===0&&!filtro&&<div style={{textAlign:"center",color:"var(--text3)",padding:"32px 0",fontSize:14}}>Nenhum evento próximo. Crie um novo! 🎪</div>}
      {evFilt.length===0&&filtro&&<div style={{textAlign:"center",color:"var(--text3)",padding:"16px 0",fontSize:14}}>Nenhum resultado para "{filtro}"</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {evFilt.map(ev=>{
          const total=ev.equipe.reduce((s,m)=>s+calcCache(m,ev),0);
          const pend=ev.equipe.filter(m=>!m.pago).reduce((s,m)=>s+calcCache(m,ev),0);
          const ativo=detalhe===ev.id;
          return(<Card key={ev.id} onClick={()=>{setDetalhe(ativo?null:ev.id);setMf(f=>({...f,freelancerId:"",cache:""}));}} style={{cursor:"pointer",borderColor:ativo?"var(--primary)":"var(--border)",boxShadow:ativo?"0 0 0 2px #8b5cf644":"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{flex:1}}><div style={{fontWeight:700,color:"var(--text)",fontSize:15,marginBottom:4}}>{ev.nome}</div><div style={{fontSize:12,color:"var(--text2)"}}>{ev.tipo}</div></div><StatusBadge status={ev.status}/></div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:4}}>📅 {fmtDate(ev.data)} ⏰ {ev.horaInicio}–{ev.horaFim}</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {ev.local}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex"}}>{ev.equipe.slice(0,4).map((m,i)=>{const f=fl(m.freelancerId);return f?<div key={i} style={{marginLeft:i>0?-8:0}}><Avatar nome={f.nome} size={26}/></div>:null;})}{ev.equipe.length===0&&<span style={{fontSize:12,color:"var(--text3)"}}>Sem equipe</span>}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>R$ {total.toFixed(2).replace(".",",")}</div>{pend>0&&<div style={{fontSize:11,color:"var(--warning)"}}>R$ {pend.toFixed(2).replace(".",",")} pend.</div>}</div>
                <button onClick={e=>{e.stopPropagation();setGcal(ev);}} style={{background:"#1a73e822",border:"1px solid #1a73e855",borderRadius:8,color:"#4285f4",cursor:"pointer",padding:"4px 6px",fontSize:14}}></button>
                <button onClick={e=>{e.stopPropagation();setConfirmar(ev);}} style={{background:"var(--danger-light)",border:"1px solid var(--danger-light)",borderRadius:8,color:"var(--danger)",cursor:"pointer",padding:"4px 6px",fontSize:14}}>🗑️</button>
              </div>
            </div>
          </Card>);
        })}
      </div>

      {/* Eventos anteriores */}
      {(evPassados.length>0||(filtro&&evPassFilt.length>0))&&(

          <button onClick={()=>setVerPassados(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 16px",color:"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,marginBottom:16}}>
            <span style={{fontSize:16}}>{verPassados?"▼":"▶"}</span>

                const total=ev.equipe.reduce((s,m)=>s+calcCache(m,ev),0);
                const ativo=detalhe===ev.id;
                return(<Card key={ev.id} onClick={()=>{setDetalhe(ativo?null:ev.id);setMf(f=>({...f,freelancerId:"",cache:""}));}} style={{cursor:"pointer",borderColor:ativo?"var(--primary)":"var(--border)",boxShadow:ativo?"0 0 0 2px #8b5cf644":"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div style={{flex:1}}><div style={{fontWeight:700,color:"var(--text)",fontSize:15,marginBottom:4}}>{ev.nome}</div><div style={{fontSize:12,color:"var(--text2)"}}>{ev.tipo}</div></div><StatusBadge status={ev.status}/></div>
                  <div style={{fontSize:13,color:"var(--text2)",marginBottom:4}}>📅 {fmtDate(ev.data)} ⏰ {ev.horaInicio}–{ev.horaFim}</div>
                  <div style={{fontSize:13,color:"var(--text2)",marginBottom:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {ev.local}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex"}}>{ev.equipe.slice(0,4).map((m,i)=>{const f=fl(m.freelancerId);return f?<div key={i} style={{marginLeft:i>0?-8:0}}><Avatar nome={f.nome} size={26}/></div>:null;})}{ev.equipe.length===0&&<span style={{fontSize:12,color:"var(--text3)"}}>Sem equipe</span>}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>R$ {total.toFixed(2).replace(".",",")}</div>
                      <button onClick={e=>{e.stopPropagation();setConfirmar(ev);}} style={{background:"var(--danger-light)",border:"1px solid var(--danger-light)",borderRadius:8,color:"var(--danger)",cursor:"pointer",padding:"4px 6px",fontSize:14}}>🗑️</button>

        {det&&(<div style={{padding:22,minWidth:300}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>

            {[...det.equipe].sort((a,b)=>{const fa=fl(a.freelancerId);const fb=fl(b.freelancerId);return(fa?.nome||"").localeCompare(fb?.nome||"","pt-BR");}).map((m,idx)=>{

          </div>
          <div style={{background:"var(--bg)",borderRadius:10,padding:14}}>
