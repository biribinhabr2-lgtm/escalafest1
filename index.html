}





function AppFuncionario({user,perfil,onLogout,adminId,perguntas}){
  const[aba,setAba]=useState("disponibilidade");
  const[mob,setMob]=useState(window.innerWidth<640);
  const[disp,setDisp]=useState({});
  const[eventos,setEventos]=useState([]);
  const[freelancers,setFreelancers]=useState([]);
  const[funcoes,setFuncoes]=useState([]);
  const[treinamentos,setTreinamentos]=useState([]);
  const[salvando,setSalvando]=useState(false);
  const[carregando,setCarregando]=useState(true);
  const[notifPermissao,setNotifPermissao]=useState(()=>{
    try{return typeof Notification!=="undefined"?Notification.permission:"unsupported";}
    catch{return "unsupported";}
  });
  const[pendFeedbackCount,setPendFeedbackCount]=useState(0);
  const[resolvedAdmin,setResolvedAdmin]=useState(adminId);
  const saveTimer=useRef({});

  useEffect(()=>{const h=()=>setMob(window.innerWidth<640);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  useEffect(()=>{
    const load=async()=>{
      try{
        const {data:p}=await sb.from("sf_perfis").select("admin_id").eq("id",user.id).single();
        const resolvedAdminId=p?.admin_id||adminId;
        setResolvedAdmin(resolvedAdminId);
        if(!resolvedAdminId){setCarregando(false);return;}
        const[dsp,evs,fls,fns,trs]=await Promise.all([
          cloudLoad(user.id,"disponibilidade"),
          crossLoad(resolvedAdminId,"eventos"),
          crossLoad(resolvedAdminId,"freelancers"),
          crossLoad(resolvedAdminId,"funcoes"),
          crossLoad(resolvedAdminId,"treinamentos"),
        ]);
        setDisp(dsp||{});setEventos(evs||[]);setFreelancers(fls||[]);
        setFuncoes(fns||FUNCOES_INIT);setTreinamentos(trs||[]);
      } catch(e){
        console.error("Erro ao carregar dados do funcionário:",e);
      } finally {
        setCarregando(false);
      }
    };
    load();
  },[user.id,adminId]);

  const schedSaveDisp=dados=>{clearTimeout(saveTimer.current.disp);setSalvando(true);saveTimer.current.disp=setTimeout(async()=>{await cloudSave(user.id,"disponibilidade",dados);setSalvando(false);},1500);};
  const setDispS=v=>{const next=typeof v==="function"?v(disp):v;setDisp(next);schedSaveDisp(next);};

  // ── NOTIFICAÇÕES ──────────────────────────────────────────────────────────
  // Solicitar permissão apenas quando usuário clicar no botão (não auto — mobile bloqueia)

  // Checar eventos do dia e novos eventos ao escalar (polling a cada 3 min)
  useEffect(()=>{
    if(carregando)return;
    const VISTO_KEY=`sf_notif_vistos_${user.id}`;
    const PRIMEIRO_KEY=`sf_notif_primeiro_${user.id}`;

    const check=async(isPrimeiro)=>{
      const hoje=new Date().toISOString().slice(0,10);
      if(!resolvedAdmin)return;
      const evsFrescos=await crossLoad(resolvedAdmin,"eventos")||[];
      const fls=await crossLoad(resolvedAdmin,"freelancers")||[];
      const meuFl=fls.find(f=>f.userId===user.id||f.email===user.email);
      if(!meuFl)return;
      const vistos=JSON.parse(localStorage.getItem(VISTO_KEY)||"[]");
      const novosVistos=[...vistos];

      evsFrescos.forEach(ev=>{
        const membro=ev.equipe?.find(m=>m.freelancerId===meuFl.id);
        if(!membro)return;
        const chaveEscala=`escala_${ev.id}`;
        if(!vistos.includes(chaveEscala)){
          // Na primeira verificação, apenas marcar como visto sem notificar
          // (evita notificar eventos antigos na primeira vez que o funcionário abre o app)
          if(!isPrimeiro){
            dispararNotificacao("🎪 Você foi escalado!",`${ev.nome} — ${ev.data?ev.data.split("-").reverse().join("/"):""} às ${ev.horaInicio}`,chaveEscala);
          }
          novosVistos.push(chaveEscala);
        }
        // Notificação do dia do evento — sempre notifica (mesmo na primeira vez)
        if(ev.data===hoje){
          const chaveDia=`dia_${ev.id}_${hoje}`;
          if(!vistos.includes(chaveDia)){
            const logistica=[];
            if(ev.horarioQuintal)logistica.push(`Quintal ${ev.horarioQuintal}`);
            if(ev.horarioGalpao)logistica.push(`Galpão ${ev.horarioGalpao}`);
            dispararNotificacao(
              `📅 Evento hoje: ${ev.nome}`,
              `⏰ ${ev.horaInicio}–${ev.horaFim} · 📍 ${ev.local}${logistica.length?"\n🚌 "+logistica.join(" | "):""}`,
              chaveDia
            );
            novosVistos.push(chaveDia);
          }
        }
      });
      if(novosVistos.length!==vistos.length)
        localStorage.setItem(VISTO_KEY,JSON.stringify(novosVistos));
    };

    // Primeira checagem: marcar tudo como visto sem notificar
    const isPrimeiro=!localStorage.getItem(PRIMEIRO_KEY);
    if(isPrimeiro)localStorage.setItem(PRIMEIRO_KEY,"1");
    check(isPrimeiro);
    const interval=setInterval(()=>check(false),3*60*1000);
    return()=>clearInterval(interval);
  },[carregando,resolvedAdmin]);

  // Encontrar o freelancer pelo userId OU email
  const meuFl=freelancers.find(f=>f.userId===user.id)||freelancers.find(f=>f.email===user.email);
  const meusEventos=meuFl?eventos.filter(ev=>ev.equipe?.find(m=>m.freelancerId===meuFl.id)):[];
  const fnCor=nome=>(funcoes.find(f=>f.nome===nome)||{}).cor||"var(--text3)";
  const fmtD=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};

  // ── Ganhos: agrupar eventos por mês — HOOKS DEVEM VIR ANTES DO RETURN CONDICIONAL ──
  const[gSubAba,setGSubAba]=useState("pendentes");
  const[gFMes,setGFMes]=useState("");

  if(carregando)return(<div style={{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",flexDirection:"column",gap:16}}><img src={LOGO_URL} alt="EscalaFest" style={{height:64,objectFit:"contain"}}/><div style={{color:"var(--text3)",fontSize:14}}>Carregando...</div></div>);

  const NAV=[{id:"disponibilidade",label:"Disponibilidade"},{id:"eventos",label:"Meus Eventos"},{id:"ganhos",label:"Ganhos"},{id:"treinamentos",label:"Treinamentos"},{id:"feedback",label:"Feedback"}];
  const ganhosPorMes=meusEventos.reduce((acc,ev)=>{
    const mb=ev.equipe?.find(m=>m.freelancerId===meuFl?.id);
    if(!mb||!ev.data)return acc;
    const mes=ev.data.slice(0,7);
    const total=calcCache(mb,ev);
    if(!acc[mes])acc[mes]={mes,total:0,pago:0,pendente:0,eventos:[]};
    acc[mes].total+=total;
    if(mb.pago)acc[mes].pago+=total;
    else acc[mes].pendente+=total;
    acc[mes].eventos.push({...ev,membro:mb});
    return acc;
  },{});
  // Sorted oldest → newest
  const mesesOrdenados=Object.values(ganhosPorMes).sort((a,b)=>a.mes.localeCompare(b.mes));
  const mesesFiltrados=gFMes?mesesOrdenados.filter(m=>m.mes===gFMes):mesesOrdenados;
  const fmtMes=m=>{const[y,mo]=m.split("-");return`${MESES[+mo-1]} ${y}`;};
  const totalGeral=mesesOrdenados.reduce((s,m)=>s+m.total,0);
  const totalPago=mesesOrdenados.reduce((s,m)=>s+m.pago,0);
  const totalPendente=mesesOrdenados.reduce((s,m)=>s+m.pendente,0);
  const totalMesesFiltPend=mesesFiltrados.reduce((s,m)=>s+m.pendente,0);
  const totalMesesFiltPago=mesesFiltrados.reduce((s,m)=>s+m.pago,0);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"var(--bg)"}}>
      {/* Header — igual ao admin */}
      <header style={{background:"#0C6E7E",borderBottom:"none",padding:"0 24px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <img src={LOGO_URL} alt="EscalaFest" style={{height:44,objectFit:"contain"}}/>
          {!mob&&<span style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,.65)",letterSpacing:"0.08em",textTransform:"uppercase"}}>Colaborador</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>

          <div style={{padding:"18px 20px 14px",borderBottom:"1px solid #1E293B"}}>

          </div>
          <div style={{padding:"8px 0",flex:1}}>
            {(()=>{const hoje=new Date().toISOString().slice(0,10);const evPass=meusEventos.filter(ev=>ev.data<hoje);return NAV.map(n=>{const badge=n.id==="feedback"&&evPass.length>0?null:null;return(<button key={n.id} onClick={()=>setAba(n.id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 20px",background:aba===n.id?"#1E293B":"transparent",borderLeft:aba===n.id?"2px solid #3B82F6":"2px solid transparent",border:"none",color:aba===n.id?"#F8FAFC":"#94A3B8",fontWeight:aba===n.id?600:400,fontSize:13,cursor:"pointer",width:"100%",textAlign:"left",fontFamily:"inherit"}}>
              <span>{n.label}</span>
              {n.id==="feedback"&&pendFeedbackCount>0&&<span style={{background:"#EF4444",color:"#fff",borderRadius:20,fontSize:10,fontWeight:700,padding:"1px 6px",flexShrink:0}}>{pendFeedbackCount}</span>}
            </button>);});})()}
          </div>
          <div style={{padding:"12px 16px 20px",borderTop:"1px solid #1E293B"}}>
            <div style={{fontSize:10,color:"#475569",marginBottom:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{perfil?.nome||user.email}</div>
            <button onClick={onLogout} style={{background:"transparent",border:"1px solid rgba(239,68,68,.25)",borderRadius:6,color:"#EF4444",cursor:"pointer",fontSize:11,padding:"6px 10px",fontFamily:"inherit",width:"100%",textAlign:"left"}}>Encerrar sessão</button>
          </div>
        </nav>)}
        {/* Conteúdo */}
        <main style={{flex:1,overflowY:"auto",position:"relative",background:"var(--bg)"}}>
          {salvando&&<div style={{position:"fixed",bottom:20,right:20,background:"var(--sidebar)",borderRadius:"var(--radius)",padding:"7px 16px",fontSize:12,color:"#fff",zIndex:999,fontWeight:500,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>Salvando...</div>}
          {notifPermissao==="default"&&"Notification" in window&&(
            <div style={{background:"#EFF6FF",borderBottom:"1px solid #BFDBFE",padding:"10px 24px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:"var(--text)",flex:1}}>Ative as notificações para receber alertas de novas escalas e eventos do dia.</span>
              <button onClick={async()=>{const ok=await pedirPermissaoNotificacao();setNotifPermissao(ok?"granted":"denied");if(ok){dispararNotificacao("✅ EscalaFest","Notificações ativadas!","sf-teste");}}} style={{background:"var(--primary)",border:"none",borderRadius:"var(--radius)",padding:"6px 14px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>Ativar notificações</button>
            </div>
          )}
          {notifPermissao==="granted"&&(
            <div style={{background:"var(--success-light)",borderBottom:"1px solid #BBF7D0",padding:"8px 24px",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"var(--success)",flex:1}}>Notificações ativas</span>
              <button onClick={()=>{localStorage.removeItem(`sf_notif_vistos_${user.id}`);localStorage.removeItem(`sf_notif_primeiro_${user.id}`);dispararNotificacao("🎪 EscalaFest","Notificações funcionando!","teste");}} style={{background:"transparent",border:"1px solid #BBF7D0",borderRadius:6,padding:"4px 12px",color:"var(--success)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Testar</button>
            </div>
          )}
          {aba==="disponibilidade"&&<DisponibilidadeFuncionario user={user} perfil={perfil} disp={disp} setDisp={setDispS}/>}
          {aba==="ganhos"&&(
          <div style={{padding:"20px 16px"}}>
            <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
              <h2 style={{color:"var(--text)",margin:"0 0 2px",fontSize:18,fontWeight:600}}>Ganhos</h2>
              <p style={{color:"var(--text2)",margin:0,fontSize:13}}>Seus cachês por período</p>
            </div>
            {/* Resumo geral */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
              {[{label:"Total",v:totalGeral,cor:"var(--primary)"},{label:"Recebido",v:totalPago,cor:"var(--success)"},{label:"A Receber",v:totalPendente,cor:"var(--warning)"}].map(c=>(
                <div key={c.label} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:15,fontWeight:800,color:c.cor}}>R${c.v.toFixed(0)}</div>
                  <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{c.label}</div>
                </div>
              ))}
            </div>
            {/* Sub-abas */}
            <div style={{display:"flex",gap:0,marginBottom:14,border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
              {[["pendentes","A Receber",totalPendente],["pagos","Recebido",totalPago]].map(([id,label,val])=>(
                <button key={id} onClick={()=>setGSubAba(id)} style={{flex:1,padding:"10px 6px",background:gSubAba===id?"var(--primary)":"var(--card)",color:gSubAba===id?"#fff":"var(--text2)",border:"none",fontSize:12,fontWeight:gSubAba===id?700:400,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                  <span>{label}</span>
                  <span style={{fontSize:11,opacity:0.8}}>R$ {val.toFixed(2).replace(".",",")}</span>
                </button>
              ))}
            </div>
            {/* Seletor de mês */}
            {mesesOrdenados.length>0&&(
              <div style={{display:"flex",gap:6,flexWrap:"nowrap",overflowX:"auto",marginBottom:14,paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
                <button onClick={()=>setGFMes("")} style={{flexShrink:0,padding:"5px 12px",borderRadius:6,border:`1px solid ${!gFMes?"var(--primary)":"var(--border)"}`,background:!gFMes?"var(--primary)":"var(--card)",color:!gFMes?"#fff":"var(--text2)",fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>Todos</button>
                {mesesOrdenados.map(({mes})=>{
                  const[y,mo]=mes.split("-");
                  return(
                    <button key={mes} onClick={()=>setGFMes(mes)} style={{flexShrink:0,padding:"5px 12px",borderRadius:6,border:`1px solid ${gFMes===mes?"var(--primary)":"var(--border)"}`,background:gFMes===mes?"var(--primary)":"var(--card)",color:gFMes===mes?"#fff":"var(--text2)",fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                      {MESES[+mo-1].slice(0,3)} {y.slice(2)}
                    </button>
                  );
                })}
              </div>
            )}
            {/* Lista de eventos */}
            {mesesFiltrados.length===0&&<div style={{textAlign:"center",color:"var(--text3)",padding:"32px 0",fontSize:13}}>Nenhum evento neste período.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {mesesFiltrados.map(({mes,pago,pendente,eventos:evs})=>{
                const evsFiltrados=evs.filter(ev=>gSubAba==="pagos"?ev.membro.pago:!ev.membro.pago).sort((a,b)=>a.data.localeCompare(b.data));
                if(!evsFiltrados.length)return null;
                const totalSub=evsFiltrados.reduce((s,ev)=>s+calcCache(ev.membro,ev),0);
                return(
                  <div key={mes} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}}>
                    <div style={{background:"var(--bg)",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{fontWeight:700,color:"var(--text)",fontSize:14}}>{fmtMes(mes)}</div>
                      <div style={{fontSize:14,fontWeight:800,color:gSubAba==="pagos"?"var(--success)":"var(--warning)"}}>R$ {totalSub.toFixed(2).replace(".",",")}</div>
                    </div>
                    {gSubAba==="pagos"&&<div style={{height:3,background:"var(--success)"}}/>}
                    {gSubAba==="pendentes"&&pendente>0&&<div style={{height:3,background:"var(--warning)"}}/>}
                    <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
                      {evsFiltrados.map(ev=>(
                        <div key={ev.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"var(--bg)",borderRadius:"var(--radius)"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:600,color:"var(--text)",fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.nome}</div>
                            <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>📅 {fmtD(ev.data)} · <span style={{color:fnCor(ev.membro.funcao)}}>{ev.membro.funcao}</span></div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontWeight:700,color:ev.membro.pago?"var(--success)":"var(--warning)",fontSize:14}}>R$ {calcCache(ev.membro,ev).toFixed(2).replace(".",",")}</div>
                            {ev.membro.bonus?.ativo&&(()=>{const n=NIVEIS_BONUS.find(x=>x.id===ev.membro.bonus.nivel);return n?<div style={{fontSize:10,color:n.cor}}>+R${n.valor}</div>:null;})()}
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{padding:"8px 14px",borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{evsFiltrados.length} evento{evsFiltrados.length!==1?"s":""}</span>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--text)"}}>R$ {totalSub.toFixed(2).replace(".",",")}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {aba==="eventos"&&<MeusEventosFl meuFl={meuFl} meusEventos={meusEventos} fnCor={fnCor} fmtD={fmtD} freelancers={freelancers} user={user}/>}
        {aba==="treinamentos"&&<AbaTreinamentos treinamentos={treinamentos} setTreinamentos={setTreinamentos} readOnly adminId={resolvedAdmin} user={user} perfil={perfil}/>}
        {aba==="feedback"&&<AbaFeedback meuFl={meuFl} meusEventos={meusEventos} user={user} adminId={resolvedAdmin} perguntas={perguntas} onPendingChange={setPendFeedbackCount}/>}
        </main>
      </div>
      {/* Mobile nav — fora do flex row, fixo na base */}
      {mob&&(<nav style={{background:"var(--sidebar)",borderTop:"1px solid #1E293B",display:"flex",flexShrink:0}}>
        <div style={{display:"flex",flex:1,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {NAV.map(n=>(<button key={n.id} onClick={()=>setAba(n.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 14px",background:"transparent",border:"none",borderBottom:aba===n.id?"2px solid #3B82F6":"2px solid transparent",color:aba===n.id?"#93C5FD":"#64748B",fontWeight:aba===n.id?600:400,fontSize:10,cursor:"pointer",fontFamily:"inherit",flexShrink:0,minWidth:60,position:"relative"}}>
            <span style={{fontSize:18,lineHeight:1}}>{n.id==="disponibilidade"?"📅":n.id==="eventos"?"🗓️":n.id==="ganhos"?"💰":n.id==="treinamentos"?"📚":"💬"}</span>
            <span>{n.label==="Disponibilidade"?"Disp.":n.label==="Meus Eventos"?"Eventos":n.label==="Treinamentos"?"Treinos":n.label}</span>
            {n.id==="feedback"&&pendFeedbackCount>0&&<span style={{position:"absolute",top:6,right:6,background:"#EF4444",color:"#fff",borderRadius:20,fontSize:8,fontWeight:700,padding:"0 4px",lineHeight:"14px"}}>{pendFeedbackCount}</span>}
          </button>))}
        </div>
        <div style={{display:"flex",borderLeft:"1px solid #1E293B",flexShrink:0}}>
          <button onClick={()=>window.location.reload()} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 12px",background:"transparent",border:"none",color:"#475569",fontSize:18,cursor:"pointer",fontFamily:"inherit"}}>↻</button>
          <button onClick={onLogout} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 12px",background:"transparent",border:"none",color:"#EF4444",fontSize:16,cursor:"pointer",fontFamily:"inherit"}}>⏻</button>
        </div>
      </nav>)}
    </div>
  );
}

// ── ABA EQUIPE COM CRIAR CONTA ─────────────────────────────────────────────────
function AbaEquipeAdmin({freelancers,setFreelancers,eventos,funcoes,adminUser}){
  const[modal,setModal]=useState(false);const[modalCriar,setModalCriar]=useState(false);
  const[form,setForm]=useState({});const[formCriar,setFormCriar]=useState({email:"",senha:"",nome:"",telefone:"",funcoes:[],pix:"",obs:""});
  const[busca,setBusca]=useState("");const[confirmar,setConfirmar]=useState(null);const[loading,setLoading]=useState(false);const[msg,setMsg]=useState(null);
  const salvar=()=>{if(!form.nome)return;if(form.id)setFreelancers(fl=>fl.map(f=>f.id===form.id?{...form}:f));else setFreelancers(fl=>[...fl,{...form,id:Date.now()}]);setModal(false);};
  const excluir=id=>{setFreelancers(fl=>fl.filter(f=>f.id!==id));setConfirmar(null);};
  const togFn=fn=>setForm(f=>({...f,funcoes:(f.funcoes||[]).includes(fn)?f.funcoes.filter(x=>x!==fn):[...(f.funcoes||[]),fn]}));
  const togFnC=fn=>setFormCriar(f=>({...f,funcoes:(f.funcoes||[]).includes(fn)?f.funcoes.filter(x=>x!==fn):[...(f.funcoes||[]),fn]}));
  const evCount=id=>eventos.filter(ev=>ev.equipe?.find(m=>m.freelancerId===id)).length;
  const[filtroBonus,setFiltroBonus]=useState("todos");
  const filtBase=[...freelancers].filter(f=>f.nome?.toLowerCase().includes(busca.toLowerCase())).sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
  const filt=filtroBonus==="todos"?filtBase:filtroBonus==="sem"?filtBase.filter(f=>!f.nivelBonus):filtBase.filter(f=>f.nivelBonus===filtroBonus);
  const fnCor=nome=>(funcoes.find(f=>f.nome===nome)||{}).cor||"var(--text3)";
  const criarFuncionario=async()=>{
    if(!formCriar.email||!formCriar.senha||!formCriar.nome){setMsg({tipo:"erro",texto:"Preencha e-mail, senha e nome."});return;}
    setLoading(true);setMsg(null);

    // Criar um cliente Supabase separado para não afetar a sessão do admin
    const sbTemp=supabase.createClient(SUPA_URL,SUPA_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
    const{data,error}=await sbTemp.auth.signUp({email:formCriar.email,password:formCriar.senha});

    if(error){
      setMsg({tipo:"erro",texto:error.message==="User already registered"?"Este e-mail já está cadastrado.":error.message});
      setLoading(false);return;
    }

    const uid=data.user?.id;
    if(uid){
      await sb.from("sf_perfis").upsert({
        id:uid,role:"funcionario",
        nome:formCriar.nome,telefone:formCriar.telefone,
        funcoes:formCriar.funcoes,pix:formCriar.pix,obs:formCriar.obs,
        admin_id:adminUser.id
      });
      const novoFl={
        id:Date.now(),nome:formCriar.nome,telefone:formCriar.telefone,
        email:formCriar.email,funcoes:formCriar.funcoes,pix:formCriar.pix,
        obs:formCriar.obs,userId:uid
      };
      setFreelancers(fl=>[...fl,novoFl]);
      setMsg({tipo:"ok",texto:`✅ Conta criada! Envie o link do app, o e-mail "${formCriar.email}" e a senha para o funcionário.`});
    } else {
      setMsg({tipo:"erro",texto:"Não foi possível obter o ID do usuário."});
    }
    setLoading(false);
  };
  return(
    <div style={{padding:24,flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div><h2 style={{color:"var(--text)",margin:0,fontSize:18,fontWeight:700,letterSpacing:"-0.01em"}}>👥 Equipe</h2><p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:12}}>{filt.length} de {freelancers.length} profissionais</p></div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar..." style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"8px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
          <Btn onClick={()=>{setFormCriar({email:"",senha:"",nome:"",telefone:"",funcoes:[],pix:"",obs:""});setMsg(null);setModalCriar(true);}}>👤 Criar Acesso Funcionário</Btn>
          <Btn variant="ghost" onClick={()=>{setForm({nome:"",telefone:"",email:"",funcoes:[],pix:"",obs:""});setModal(true);}}>＋ Freelancer sem login</Btn>
        </div>
      </div>
      {/* Filtros de bonificação */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["todos","Todos",freelancers.length],["sem","Sem bônus",freelancers.filter(f=>!f.nivelBonus).length],...NIVEIS_BONUS.map(n=>[n.id,`⭐ ${n.label}`,freelancers.filter(f=>f.nivelBonus===n.id).length])].map(([v,l,n])=>(
          <button key={v} onClick={()=>setFiltroBonus(v)} style={{background:filtroBonus===v?"var(--primary-light)":"var(--card)",border:`1px solid ${filtroBonus===v?"var(--primary)":"var(--border)"}`,borderRadius:10,padding:"7px 14px",color:filtroBonus===v?"var(--primary)":"var(--text2)",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
            {l} <span style={{background:filtroBonus===v?"var(--primary-light)":"var(--surface)",borderRadius:20,padding:"1px 7px",fontSize:11,color:filtroBonus===v?"var(--primary)":"var(--text3)"}}>{n}</span>
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
        {filt.map(f=>(
          <div key={f.id} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:16,padding:20}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:avatarColor(f.nome||"?"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,color:"#fff",flexShrink:0}}>{(f.nome||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:"var(--text)",fontSize:15,wordBreak:"break-word"}}>{f.nome}</div>
                <div style={{fontSize:12,color:"var(--text3)"}}>📱 {f.telefone}</div>
                {f.email&&<div style={{fontSize:11,color:"var(--text3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>✉️ {f.email}</div>}
                <div style={{fontSize:12,color:"var(--text3)"}}>{evCount(f.id)} eventos</div>
                {f.userId&&<div style={{fontSize:10,color:"var(--success)",marginTop:2}}>✅ Acesso ao app</div>}
                {f.nivelBonus&&<div style={{fontSize:10,color:NIVEIS_BONUS.find(n=>n.id===f.nivelBonus)?.cor,marginTop:2,fontWeight:700}}>⭐ {NIVEIS_BONUS.find(n=>n.id===f.nivelBonus)?.label} (+R${NIVEIS_BONUS.find(n=>n.id===f.nivelBonus)?.valor})</div>}
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>{(f.funcoes||[]).map(fn=><span key={fn} style={{background:fnCor(fn)+"22",color:fnCor(fn),border:`1px solid ${fnCor(fn)}44`,borderRadius:6,fontSize:11,fontWeight:600,padding:"2px 8px"}}>{fn}</span>)}</div>
            {f.pix&&<div style={{marginBottom:8,fontSize:11,color:"var(--text3)"}}>💳 {f.pix}</div>}
            <div style={{display:"flex",gap:8}}>
              <Btn small variant="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setForm({...f});setModal(true);}}>Editar</Btn>
              <Btn small variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmar(f)}>Excluir</Btn>
            </div>
          </div>
        ))}
      </div>
      <Modal open={modalCriar} onClose={()=>setModalCriar(false)} title="👤 Criar Acesso para Funcionário">
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{background:"#8b5cf615",border:"1px solid #8b5cf633",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--primary)"}}>💡 Cria um login para o funcionário acessar a área dele (disponibilidade + eventos escalados).</div>
          <Inp label="Nome Completo" value={formCriar.nome} onChange={e=>setFormCriar(f=>({...f,nome:e.target.value}))} placeholder="Nome do funcionário"/>
          <Inp label="E-mail (será o login)" value={formCriar.email} onChange={e=>setFormCriar(f=>({...f,email:e.target.value}))} type="email" placeholder="email@exemplo.com"/>
          <Inp label="Senha inicial" value={formCriar.senha} onChange={e=>setFormCriar(f=>({...f,senha:e.target.value}))} type="password" placeholder="Mínimo 6 caracteres"/>
          <Inp label="Telefone / WhatsApp" value={formCriar.telefone} onChange={e=>setFormCriar(f=>({...f,telefone:e.target.value}))} placeholder="(11) 99999-0000"/>

// ── CARD TREINO (componente separado para evitar perda de foco no mobile) ─────
function CardTreino({t,past,readOnly,meuId,meuNome,onTogglePresenca,onSalvarComentario,onExcluirComentario,treinoAberto,setTreinoAberto,interacoes}){
  const[novoComentario,setNovoComentario]=useState("");
  const inputRef=useRef(null);
  const inter=interacoes||{confirmados:{},comentarios:[]};
  const confirmados=inter.confirmados||{};
  const comentarios=[...(inter.comentarios||[])].sort((a,b)=>a.at.localeCompare(b.at));
  const euConfirmei=!!confirmados[meuId];
  const nConfirmados=Object.keys(confirmados).length;
  const aberto=treinoAberto===t.id;
  const fmtDia=d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
  const diasRestantes=d=>{const diff=Math.ceil((new Date(d)-new Date())/(1000*60*60*24));if(diff<0)return null;if(diff===0)return"Hoje!";if(diff===1)return"Amanhã";return`em ${diff} dias`;};
  const fmtHora=iso=>{try{return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});}catch{return"";}};
  const dias=diasRestantes(t.data);

  const enviar=()=>{
    if(!novoComentario.trim())return;
    onSalvarComentario(t,novoComentario.trim());
    setNovoComentario("");
    // Manter foco no input após enviar
    setTimeout(()=>inputRef.current?.focus(),50);
  };

  return(
    <div style={{background:"var(--card)",border:`1px solid ${past?"var(--border)":euConfirmei?"var(--success-light)":"var(--primary-light)"}`,borderRadius:16,overflow:"hidden",opacity:past?0.85:1}}>
      <div style={{padding:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:"var(--text)",fontSize:16,marginBottom:4}}>{t.titulo}</div>
            {t.descricao&&<div style={{fontSize:13,color:"var(--text2)",marginBottom:6}}>{t.descricao}</div>}
          </div>
          {dias&&<span style={{background:"var(--primary-light)",color:"var(--primary)",border:"1px solid #8b5cf633",borderRadius:8,fontSize:11,fontWeight:700,padding:"3px 10px",whiteSpace:"nowrap",marginLeft:8}}>{dias}</span>}
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
          <span style={{fontSize:13,color:"var(--text2)"}}>📅 {fmtDia(t.data)}</span>
          {t.hora&&<span style={{fontSize:13,color:"var(--text2)"}}>⏰ {t.hora}</span>}
          {t.local&&<span style={{fontSize:13,color:"var(--text2)"}}>📍 {t.local}</span>}
        </div>
        {!past&&(
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
            <button onClick={()=>onTogglePresenca(t)} style={{background:euConfirmei?"var(--success-light)":"var(--surface)",border:`1px solid ${euConfirmei?"var(--success)":"var(--border)"}`,borderRadius:10,padding:"8px 16px",color:euConfirmei?"var(--success)":"var(--text2)",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
              {euConfirmei?"✅ Confirmado!":"⬜ Confirmar presença"}
            </button>
            {nConfirmados>0&&<div style={{fontSize:12,color:"var(--text3)"}}>
              <span style={{color:"var(--success)",fontWeight:700}}>{nConfirmados}</span> {nConfirmados===1?"confirmação":"confirmações"}
              {!readOnly&&<span style={{color:"var(--text3)",marginLeft:4}}>({Object.values(confirmados).map(c=>c.nome).join(", ")})</span>}
            </div>}
          </div>
        )}
        {past&&nConfirmados>0&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>✅ {nConfirmados} {nConfirmados===1?"pessoa confirmou":"pessoas confirmaram"}</div>}
        <button onClick={()=>setTreinoAberto(aberto?null:t.id)} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"none",color:"var(--text3)",cursor:"pointer",fontFamily:"inherit",fontSize:12,padding:0,marginBottom:!readOnly&&!past?10:0}}>
          <span style={{fontSize:14}}>💬</span>
          {comentarios.length>0?`${comentarios.length} comentário${comentarios.length!==1?"s":""}`:("Comentários e dúvidas")}
          <span style={{fontSize:10,marginLeft:2}}>{aberto?"▲":"▼"}</span>
        </button>
        {!readOnly&&!past&&(
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <Btn small variant="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{}/* handled by parent */}>Editar</Btn>
            <Btn small variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>{}/* handled by parent */}>Excluir</Btn>
          </div>
        )}
      </div>
      {aberto&&(
        <div style={{borderTop:"1px solid var(--border)",padding:"14px 20px",background:"var(--bg)"}}>
          {comentarios.length===0&&<div style={{fontSize:13,color:"var(--text3)",marginBottom:14,textAlign:"center"}}>Nenhum comentário ainda.</div>}
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            {comentarios.map(c=>(
              <div key={c.id} style={{background:"var(--card)",borderRadius:10,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:avatarColor(c.nome||"?"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>
                  {(c.nome||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12,fontWeight:700,color:"var(--text)"}}>{c.nome}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:10,color:"var(--text3)"}}>{fmtHora(c.at)}</span>
                      {(c.userId===meuId||!readOnly)&&<button onClick={()=>onExcluirComentario(t,c.id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:12,padding:"0 2px",opacity:0.6}}>✕</button>}
                    </div>
                  </div>
                  <div style={{fontSize:13,color:"var(--text2)",wordBreak:"break-word"}}>{c.texto}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input
              ref={inputRef}
              value={novoComentario}
              onChange={e=>setNovoComentario(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();enviar();}}}
              placeholder="Escreva um comentário ou dúvida..."
              style={{flex:1,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"9px 14px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit"}}
            />
            <button onClick={enviar} disabled={!novoComentario.trim()} style={{background:"var(--primary)",border:"none",borderRadius:10,padding:"9px 16px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",opacity:novoComentario.trim()?1:0.4}}>
              Enviar
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ABA TREINAMENTOS ──────────────────────────────────────────────────────────
function AbaTreinamentos({treinamentos,setTreinamentos,adminId,readOnly,user,perfil,freelancers}) /* refactored */{
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[confirmar,setConfirmar]=useState(null);
  const[treinoAberto,setTreinoAberto]=useState(null);
  const[filtro,setFiltro]=useState("todos");
  const[verPass,setVerPass]=useState(false);
  // interacoes: {treinoId: {confirmados:{userId:{nome,at}}, comentarios:[{id,userId,nome,texto,at}]}}
  const[interacoes,setInteracoes]=useState({});
  const[carregandoInt,setCarregandoInt]=useState(false);
  const hoje=new Date().toISOString().slice(0,10);
  const meuId=user?.id;
  const meuNome=perfil?.nome||user?.email||"Você";
  const resolvedAdminId=adminId||user?.id;

  // Carregar interações: admin carrega de todos os freelancers, funcionário só as suas
  useEffect(()=>{
    if(!resolvedAdminId||!treinamentos.length)return;
    setCarregandoInt(true);
    const carregarTodas=async()=>{
      let merged={};
      if(!readOnly){
        // Admin: carregar interações de todos os freelancers com userId
        const comUserId=(freelancers||[]).filter(f=>f.userId);
        // Também carregar as próprias do admin
        const fontes=[{userId:meuId},...comUserId];
        await Promise.all(fontes.map(async f=>{
          const dados=await loadInteracoes(f.userId,resolvedAdminId);
          // Merge: para cada treinoId, mesclar confirmados e comentarios
          Object.entries(dados||{}).forEach(([tid,inter])=>{
            if(!merged[tid])merged[tid]={confirmados:{},comentarios:[]};
            merged[tid].confirmados={...merged[tid].confirmados,...(inter.confirmados||{})};
            // Comentários: adicionar sem duplicar pelo id
            (inter.comentarios||[]).forEach(c=>{
              if(!merged[tid].comentarios.find(x=>x.id===c.id))
                merged[tid].comentarios.push(c);
            });
          });
        }));
        // Ordenar comentários por data
        Object.values(merged).forEach(m=>{m.comentarios.sort((a,b)=>a.at.localeCompare(b.at));});
      } else {
        // Funcionário: carregar só as suas próprias
        merged=await loadInteracoes(meuId,resolvedAdminId)||{};
      }
      setInteracoes(merged);
      setCarregandoInt(false);
    };
    carregarTodas();
  },[resolvedAdminId,treinamentos.length,readOnly]);

  // Salvar interações do usuário atual
  const salvarMinhasInteracoes=async(novasInter)=>{
    await saveInteracoes(meuId,resolvedAdminId,novasInter);
  };

  // Obter interações mescladas para exibição (só admin vê tudo, funcionário vê as suas)
  const getInter=(tid)=>interacoes[tid]||{confirmados:{},comentarios:[]};

  const togglePresenca=(treino)=>{
    const tid=String(treino.id);
    // Atualiza localmente
    const minhasInter={...interacoes};
    if(!minhasInter[tid])minhasInter[tid]={confirmados:{},comentarios:[]};
    const novosConf={...minhasInter[tid].confirmados};
    if(novosConf[meuId])delete novosConf[meuId];
    else novosConf[meuId]={nome:meuNome,at:new Date().toISOString()};
    minhasInter[tid]={...minhasInter[tid],confirmados:novosConf};
    setInteracoes({...minhasInter});
    // Salvar só as minhas interações
    const minhas={};
    Object.entries(minhasInter).forEach(([k,v])=>{
      const confMeu=v.confirmados[meuId]?{[meuId]:v.confirmados[meuId]}:{};
      const comsMeus=v.comentarios.filter(c=>c.userId===meuId);
      if(Object.keys(confMeu).length||comsMeus.length)
        minhas[k]={confirmados:confMeu,comentarios:comsMeus};
    });
    salvarMinhasInteracoes(minhas);
  };

  const salvarComentario=(treino,texto)=>{
    const tid=String(treino.id);
    const novo={id:Date.now(),userId:meuId,nome:meuNome,texto,at:new Date().toISOString()};
    const minhasInter={...interacoes};
    if(!minhasInter[tid])minhasInter[tid]={confirmados:{},comentarios:[]};
    minhasInter[tid]={...minhasInter[tid],comentarios:[...minhasInter[tid].comentarios,novo]};
    setInteracoes({...minhasInter});
    // Salvar só as minhas
    const minhas={};
    Object.entries(minhasInter).forEach(([k,v])=>{
      const confMeu=v.confirmados[meuId]?{[meuId]:v.confirmados[meuId]}:{};
      const comsMeus=v.comentarios.filter(c=>c.userId===meuId);
      if(Object.keys(confMeu).length||comsMeus.length)
        minhas[k]={confirmados:confMeu,comentarios:comsMeus};
    });
    salvarMinhasInteracoes(minhas);
  };

  const excluirComentario=(treino,comentId)=>{
    const tid=String(treino.id);
    setInteracoes(prev=>{
      const novo={...prev,[tid]:{...prev[tid],comentarios:(prev[tid]?.comentarios||[]).filter(c=>c.id!==comentId)}};
      // Salvar
      const minhas={};
      Object.entries(novo).forEach(([k,v])=>{
        const confMeu=v.confirmados[meuId]?{[meuId]:v.confirmados[meuId]}:{};
        const comsMeus=v.comentarios.filter(c=>c.userId===meuId);
        if(Object.keys(confMeu).length||comsMeus.length)
          minhas[k]={confirmados:confMeu,comentarios:comsMeus};
      });
      salvarMinhasInteracoes(minhas);
      return novo;
    });
  };

  const ordenados=[...treinamentos].sort((a,b)=>a.data.localeCompare(b.data)||(a.hora||"").localeCompare(b.hora||""));
  const proximos=ordenados.filter(t=>t.data>=hoje);
  const passados=ordenados.filter(t=>t.data<hoje).reverse();

  const aplicarFiltro=lista=>{
    if(filtro==="confirmados")return lista.filter(t=>getInter(String(t.id)).confirmados[meuId]);
    if(filtro==="pendentes")return lista.filter(t=>!getInter(String(t.id)).confirmados[meuId]);
    return lista;
  };

  const salvar=()=>{
    if(!form.titulo||!form.data)return;
    if(form.id)setTreinamentos(t=>t.map(x=>x.id===form.id?{...form}:x));
    else setTreinamentos(t=>[...t,{...form,id:Date.now()}]);
    setModal(false);
  };
  const excluir=id=>{setTreinamentos(t=>t.filter(x=>x.id!==id));setConfirmar(null);};
  const proxFilt=aplicarFiltro(proximos);

  return(
    <div style={{padding:24,flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{color:"var(--text)",margin:0,fontSize:18,fontWeight:700,letterSpacing:"-0.01em"}}>Treinamentos</h2>
          <p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:12}}>{readOnly?"Confirme presença e tire dúvidas":"Gerencie treinamentos — equipe confirma e comenta"}</p>
        </div>
        {!readOnly&&<Btn onClick={()=>{setForm({titulo:"",descricao:"",data:"",hora:"",local:""});setModal(true);}}>＋ Novo Treinamento</Btn>}
      </div>

      {/* Filtros */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {[["todos","Todos",proximos.length],["confirmados","✅ Confirmei",proximos.filter(t=>getInter(String(t.id)).confirmados[meuId]).length],["pendentes","⬜ Pendentes",proximos.filter(t=>!getInter(String(t.id)).confirmados[meuId]).length]].map(([v,l,n])=>(
          <button key={v} onClick={()=>setFiltro(v)} style={{background:filtro===v?"var(--primary-light)":"var(--card)",border:`1px solid ${filtro===v?"var(--primary)":"var(--border)"}`,borderRadius:10,padding:"7px 14px",color:filtro===v?"var(--primary)":"var(--text2)",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
            {l} <span style={{background:filtro===v?"var(--primary-light)":"var(--surface)",borderRadius:20,padding:"1px 7px",fontSize:11}}>{n}</span>
          </button>
        ))}
        {carregandoInt&&<span style={{fontSize:11,color:"var(--text3)",alignSelf:"center"}}>🔄 carregando...</span>}
      </div>

      {proxFilt.length===0&&<div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:32,textAlign:"center",color:"var(--text3)",marginBottom:20}}>
        {filtro==="confirmados"?"Você ainda não confirmou nenhum.":filtro==="pendentes"?"Você confirmou todos! ✅":readOnly?"Nenhum treinamento agendado.":"Nenhum treinamento próximo. Crie um novo!"}
      </div>}

      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:24}}>
        {proxFilt.map(t=>(
          <div key={t.id}>
            <CardTreino t={t} readOnly={readOnly} meuId={meuId} meuNome={meuNome}
              interacoes={getInter(String(t.id))}
              onTogglePresenca={togglePresenca}
              onSalvarComentario={salvarComentario}
              onExcluirComentario={excluirComentario}
              treinoAberto={treinoAberto} setTreinoAberto={setTreinoAberto}
            />
            {!readOnly&&t.data>=hoje&&(
              <div style={{display:"flex",gap:8,marginTop:8}}>
                <Btn small variant="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setForm({...t});setModal(true);}}>Editar</Btn>
                <Btn small variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmar(t)}>Excluir</Btn>
              </div>
            )}
          </div>
        ))}
      </div>

      {passados.length>0&&(
        <div>
          <button onClick={()=>setVerPass(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,background:"var(--card)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 16px",color:"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,marginBottom:12}}>
            <span>{verPass?"▼":"▶"}</span> 🗂️ Treinamentos Anteriores ({passados.length})
          </button>
          {verPass&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
            {passados.map(t=><CardTreino key={t.id} t={t} past readOnly={readOnly} meuId={meuId} meuNome={meuNome}
              interacoes={getInter(String(t.id))}
              onTogglePresenca={togglePresenca} onSalvarComentario={salvarComentario} onExcluirComentario={excluirComentario}
              treinoAberto={treinoAberto} setTreinoAberto={setTreinoAberto}/>)}
          </div>}
        </div>
      )}

      <Modal open={modal} onClose={()=>setModal(false)} title={form.id?"Editar Treinamento":"Novo Treinamento"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="Título" value={form.titulo||""} onChange={e=>setForm(f=>({...f,titulo:e.target.value}))} placeholder="Ex: Treinamento de Personagem"/>
          <Inp label="Descrição (opcional)" value={form.descricao||""} onChange={e=>setForm(f=>({...f,descricao:e.target.value}))} placeholder="Detalhes do treinamento..."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Data" type="date" value={form.data||""} onChange={e=>setForm(f=>({...f,data:e.target.value}))}/>
            <Inp label="Horário" type="time" value={form.hora||""} onChange={e=>setForm(f=>({...f,hora:e.target.value}))}/>
          </div>
          <Inp label="Local (opcional)" value={form.local||""} onChange={e=>setForm(f=>({...f,local:e.target.value}))} placeholder="Endereço ou link online"/>
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn>
            <Btn onClick={salvar}>Salvar</Btn>
          </div>
        </div>
      </Modal>
      <ConfirmDelete open={!!confirmar} onClose={()=>setConfirmar(null)} onConfirm={()=>excluir(confirmar?.id)} titulo={`Excluir "${confirmar?.titulo}"?`} descricao="O treinamento será removido."/>
    </div>
  );
}

// ── ABA BONIFICAÇÕES ───────────────────────────────────────────────────────────
function AbaBonificacoes({bonificacoes,setBonificacoes}){
  const[modal,setModal]=useState(false);
  const[form,setForm]=useState({});
  const[confirmar,setConfirmar]=useState(null);

  const salvar=()=>{
    if(!form.label||!form.valor)return;
    const id=form.id||(form.label.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")||Date.now().toString());
    if(form.id){
      setBonificacoes(b=>b.map(x=>x.id===form.id?{...form}:x));
    } else {
      setBonificacoes(b=>[...b,{...form,id}]);
    }
    setModal(false);
  };

  const excluir=id=>{setBonificacoes(b=>b.filter(x=>x.id!==id));setConfirmar(null);};

  const CORES=[
    "#3b82f6","#a855f7","#f59e0b","#10b981","#ef4444","#ec4899",
    "#f97316","#06b6d4","#84cc16","#6366f1","#14b8a6","#dc2626",
  ];

  return(
    <div style={{padding:"24px 28px",flex:1,overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingBottom:20,borderBottom:"1px solid var(--border)",flexWrap:"wrap",gap:12}}>
        <div>
          <h2 style={{color:"var(--text)",margin:0,fontSize:18,fontWeight:600}}>Bonificações</h2>
          <p style={{color:"var(--text2)",margin:"4px 0 0",fontSize:13}}>Configure níveis de bônus atribuídos aos profissionais. O bônus é adicionado ao cachê base.</p>
        </div>
        <Btn onClick={()=>{setForm({label:"",valor:"",cor:"#3b82f6"});setModal(true);}}>+ Nova bonificação</Btn>
      </div>

      {bonificacoes.length===0&&(
        <div style={{textAlign:"center",color:"var(--text3)",padding:"48px 0",fontSize:14}}>
          Nenhuma bonificação cadastrada.<br/>
          <span style={{fontSize:12}}>Crie ao menos uma para poder atribuí-la aos profissionais.</span>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:16}}>
        {bonificacoes.map(b=>(
          <Card key={b.id}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <div style={{width:44,height:44,borderRadius:10,background:b.cor+"22",border:`2px solid ${b.cor}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:b.cor}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:"var(--text)",fontSize:16}}>{b.label}</div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>ID: {b.id}</div>
              </div>
            </div>
            <div style={{background:"var(--bg)",borderRadius:8,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid var(--border)"}}>
              <span style={{fontSize:12,color:"var(--text2)"}}>Cachê extra por evento</span>
              <span style={{fontSize:18,fontWeight:800,color:b.cor}}>+ R$ {Number(b.valor).toFixed(2).replace(".",",")}</span>
            </div>
            <div style={{fontSize:12,color:"var(--text2)",marginBottom:14,lineHeight:1.5}}>
              Ativado automaticamente em eventos acima de <strong>3h</strong>. Pode ser ativado/desativado manualmente na escala.
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn small variant="ghost" style={{flex:1,justifyContent:"center"}} onClick={()=>{setForm({...b});setModal(true);}}>Editar</Btn>
              <Btn small variant="danger" style={{flex:1,justifyContent:"center"}} onClick={()=>setConfirmar(b)}>Excluir</Btn>
            </div>
          </Card>
        ))}

        <button onClick={()=>{setForm({label:"",valor:"",cor:"#3b82f6"});setModal(true);}} style={{border:"2px dashed var(--border2)",borderRadius:"var(--radius-lg)",padding:20,background:"transparent",color:"var(--text3)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,minHeight:180,fontFamily:"inherit",fontSize:13}}>
          <span style={{fontSize:22}}>+</span>Nova bonificação
        </button>
      </div>

      <Modal open={modal} onClose={()=>setModal(false)} title={form.id?"Editar bonificação":"Nova bonificação"}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Inp label="Nome da bonificação" value={form.label||""} onChange={e=>setForm(f=>({...f,label:e.target.value}))} placeholder="Ex: Pleno, Expert, Diamante..."/>
          <Inp label="Cachê extra (R$)" type="number" min="0" step="1" value={form.valor||""} onChange={e=>setForm(f=>({...f,valor:+e.target.value}))} placeholder="Ex: 15"/>
          {!form.id&&(
            <Inp label="ID interno (gerado automaticamente)" value={form.label?.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"")||""} readOnly style={{opacity:0.5}} placeholder="gerado a partir do nome"/>
          )}
          <div>
            <label style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>Cor</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
              {CORES.map(c=>(<button key={c} onClick={()=>setForm(f=>({...f,cor:c}))} style={{width:32,height:32,borderRadius:8,background:c,border:form.cor===c?"3px solid var(--text)":"2px solid transparent",cursor:"pointer",flexShrink:0}}/>))}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="color" value={form.cor||"#3b82f6"} onChange={e=>setForm(f=>({...f,cor:e.target.value}))} style={{width:42,height:36,borderRadius:8,border:"1px solid var(--border)",cursor:"pointer",padding:2}}/>
              <Inp value={form.cor||""} onChange={e=>setForm(f=>({...f,cor:e.target.value}))} placeholder="#3b82f6" style={{flex:1}}/>
            </div>
          </div>
          {form.label&&form.valor>0&&(
            <div style={{background:"var(--bg)",borderRadius:8,padding:12,border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:12,height:12,borderRadius:"50%",background:form.cor,flexShrink:0}}/>
              <span style={{fontSize:13,color:"var(--text)",fontWeight:600}}>{form.label}</span>
              <span style={{fontSize:13,color:form.cor,fontWeight:700,marginLeft:"auto"}}>+ R$ {Number(form.valor).toFixed(2).replace(".",",")}</span>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
            <Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn>
            <Btn onClick={salvar} style={{opacity:(!form.label||!form.valor)?0.4:1}}>Salvar</Btn>
          </div>
        </div>
      </Modal>

      <ConfirmDelete
        open={!!confirmar}
        onClose={()=>setConfirmar(null)}
        onConfirm={()=>excluir(confirmar.id)}
        titulo={`Excluir bonificação "${confirmar?.label}"?`}
        descricao="Profissionais com este nível perderão a referência ao bônus. Escalas já criadas não serão afetadas."
      />
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(undefined);
  const[perfil,setPerfil]=useState(null);
  const[aba,setAba]=useState("eventos");
  const[fl,setFl]=useState([]);
  const[ev,setEv]=useState([]);
  const[disp,setDisp]=useState({});
  const[funcoes,setFuncoes]=useState([]);
  const[treinamentos,setTreinamentos]=useState([]);
  const[bonificacoes,setBonificacoesState]=useState(BONUS_INIT);
  const[perguntas,setPerguntasState]=useState(PERGUNTAS_INIT);
  const[carregando,setCarregando]=useState(true);
  const[salvando,setSalvando]=useState(false);
  const[mob,setMob]=useState(typeof window!=="undefined"&&window.innerWidth<640);
  const saveTimer=useRef({});

  const carregarDados=async(userId)=>{
    setCarregando(true);
    try{
      const[fls,evs,dsp,fns,trs,bns,pergs]=await Promise.all([
        cloudLoad(userId,"freelancers"),
        cloudLoad(userId,"eventos"),
        cloudLoad(userId,"disponibilidade"),
        cloudLoad(userId,"funcoes"),
        cloudLoad(userId,"treinamentos"),
        cloudLoad(userId,"bonificacoes"),
        cloudLoad(userId,"perguntas_feedback"),
      ]);
      setFl(fls||FL_INIT);setEv(evs||EV_INIT);setDisp(dsp||DISP_INIT);
      setFuncoes(fns||FUNCOES_INIT);setTreinamentos(trs||[]);
      const bnsCarregados=bns||BONUS_INIT;
      setBonificacoesState(bnsCarregados);
      NIVEIS_BONUS=bnsCarregados;
      const prgCarregadas=pergs||PERGUNTAS_INIT;
      setPerguntasState(prgCarregadas);
    }catch(e){
      console.error("Erro ao carregar dados:",e);
    }finally{
      setCarregando(false);
    }
  };

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setUser(session?.user||null));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    const h=()=>setMob(window.innerWidth<640);
    window.addEventListener("resize",h);
    return()=>{subscription.unsubscribe();window.removeEventListener("resize",h);};
  },[]);

  useEffect(()=>{
    if(!user){setCarregando(false);setPerfil(null);return;}
    setCarregando(true);
    sb.from("sf_perfis").select("*").eq("id",user.id).single().then(async({data:p,error})=>{
      try{
        if(p&&p.role==="funcionario"){
          setPerfil(p);
        } else {
          await sb.from("sf_perfis").upsert({id:user.id,role:"admin",admin_id:user.id},{onConflict:"id"});
          setPerfil({role:"admin",id:user.id,admin_id:user.id});
          await carregarDados(user.id);
          return;
        }
      }catch(e){
        console.error("Erro no perfil:",e);
      }finally{
        setCarregando(false);
      }
    }).catch(e=>{
      console.error("Erro ao buscar perfil:",e);
      setCarregando(false);
    });
  },[user?.id]);

  const schedSave=(tipo,dados)=>{if(!user)return;clearTimeout(saveTimer.current[tipo]);setSalvando(true);saveTimer.current[tipo]=setTimeout(async()=>{await cloudSave(user.id,tipo,dados);setSalvando(false);},1500);};
  const setFlS=v=>{const next=typeof v==="function"?v(fl):v;setFl(next);schedSave("freelancers",next);};
  const setEvS=v=>{const next=typeof v==="function"?v(ev):v;setEv(next);schedSave("eventos",next);};
  const setDispS=v=>{const next=typeof v==="function"?v(disp):v;setDisp(next);schedSave("disponibilidade",next);};
  const setFuncoesS=v=>{const next=typeof v==="function"?v(funcoes):v;setFuncoes(next);schedSave("funcoes",next);};
  const setTreinamentosS=v=>{const next=typeof v==="function"?v(treinamentos):v;setTreinamentos(next);schedSave("treinamentos",next);};
  const setBonificacoes=v=>{const next=typeof v==="function"?v(bonificacoes):v;setBonificacoesState(next);NIVEIS_BONUS=next;schedSave("bonificacoes",next);};
  const setPerguntas=v=>{const next=typeof v==="function"?v(perguntas):v;setPerguntasState(next);schedSave("perguntas_feedback",next);};
  const logout=async()=>{await sb.auth.signOut();setUser(null);setPerfil(null);setFl([]);setEv([]);setDisp({});setFuncoes([]);setTreinamentos([]);};
  const resetarDados=()=>{if(!window.confirm("Tem certeza?"))return;setFlS(FL_INIT);setEvS(EV_INIT);setDispS(DISP_INIT);setFuncoesS(FUNCOES_INIT);};
  const refresh=()=>{if(user)carregarDados(user.id);};

  if(user===undefined||carregando)return <Loader/>;
  if(!user)return <TelaLogin onLogin={u=>setUser(u)}/>;
  if(perfil?.role==="funcionario")return <AppFuncionario user={user} perfil={perfil} onLogout={logout} adminId={perfil.admin_id} perguntas={perguntas}/>;
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100dvh",background:"var(--bg)"}}>
      {/* Header — Central de Escala */}
      <header style={{background:"#0C6E7E",borderBottom:"none",padding:"0 24px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,.15)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <img src={LOGO_URL} alt="EscalaFest" style={{height:44,objectFit:"contain"}}/>
          {!mob&&<span style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,.65)",letterSpacing:"0.08em",textTransform:"uppercase"}}>Central de Escala</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!mob&&<span style={{fontSize:12,color:"rgba(255,255,255,.55)",marginRight:4}}>{user.email}</span>}
          <button onClick={refresh} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.2)",borderRadius:"var(--radius)",padding:"5px 12px",color:"rgba(255,255,255,.85)",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Atualizar</button>
          <button onClick={logout} style={{background:"rgba(0,0,0,.2)",border:"1px solid rgba(255,255,255,.15)",borderRadius:"var(--radius)",padding:"5px 12px",color:"rgba(255,255,255,.85)",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>Sair</button>
        </div>
      </header>
      {/* Layout */}
      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        {!mob&&<Sidebar aba={aba} setAba={setAba} onReset={resetarDados} userEmail={user.email} onLogout={logout} onRefresh={refresh}/>}
        <main style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",position:"relative",background:"var(--bg)"}}>
          {salvando&&<div style={{position:"fixed",bottom:20,right:20,background:"var(--sidebar)",borderRadius:"var(--radius)",padding:"7px 16px",fontSize:12,color:"#fff",zIndex:999,fontWeight:500,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>Salvando...</div>}
          {aba==="eventos"&&<AbaEventos eventos={ev} setEventos={setEvS} freelancers={fl} disponibilidade={disp} funcoes={funcoes}/>}
          {aba==="equipe"&&<AbaEquipeAdmin freelancers={fl} setFreelancers={setFlS} eventos={ev} funcoes={funcoes} adminUser={user}/>}
          {aba==="funcoes"&&<AbaFuncoes funcoes={funcoes} setFuncoes={setFuncoesS}/>}
          {aba==="disponibilidade"&&<AbaDisponibilidade freelancers={fl} disponibilidade={disp} setDisponibilidade={setDispS}/>}
          {aba==="treinamentos"&&<AbaTreinamentos treinamentos={treinamentos} setTreinamentos={setTreinamentosS} adminId={user.id} user={user} perfil={perfil} freelancers={fl}/>}
          {aba==="bonificacoes"&&<AbaBonificacoes bonificacoes={bonificacoes} setBonificacoes={setBonificacoes}/>}
          {aba==="feedback"&&<AbaFeedbackAdmin freelancers={fl} eventos={ev} adminId={user.id} perguntas={perguntas} setPerguntas={setPerguntas}/>}
          {aba==="relatorios"&&<AbaRelatorios eventos={ev} setEventos={setEvS} freelancers={fl} funcoes={funcoes}/>}
        </main>
      </div>
      {mob&&<Sidebar aba={aba} setAba={setAba} mobile onReset={resetarDados} userEmail={user.email} onLogout={logout} onRefresh={refresh}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);



</script>

<script>
// ── PWA: Service Worker via Blob (sem arquivo externo) ────────────────────────
(function(){
  // Injetar manifest dinamicamente
  const manifest = {
    name:"EscalaFest",
    short_name:"EscalaFest",
    start_url:"/",
    display:"standalone",
    background_color:"#F8FAFC",
    theme_color:"#2563EB",
    icons:[
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%232563EB'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EEF%3C/text%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"},
      {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%232563EB'/%3E%3Ctext x='256' y='340' font-size='260' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EEF%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const mUrl = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = mUrl;
  document.head.appendChild(link);

  // Apple touch icon inline SVG
  const iconSvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%238b5cf6'/%3E%3Ctext x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3ESF%3C/text%3E%3C/svg%3E";
  const appleLink = document.createElement('link');
  appleLink.rel = 'apple-touch-icon'; appleLink.href = iconSvg;
  document.head.appendChild(appleLink);

  if (!('serviceWorker' in navigator)) return;

  // Safari bloqueia SW de Blob URLs — detectar e pular
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  if (isSafari) {
    console.log('[ScalaFest] Safari detectado — usando notificações diretas sem SW');
    return;
  }

  // SW inline via Blob — sem arquivo externo necessário
  const swCode = `
const CACHE = 'sf-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
});
self.addEventListener('activate', e => {
  e.waitUntil(Promise.all([
    caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))),
    self.clients.claim()
  ]));
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('supabase') || e.request.url.includes('fonts') || e.request.url.includes('unpkg') || e.request.url.includes('cdn.jsdelivr')) return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});
self.addEventListener('message', e => {
  if (e.data && e.data.type === 'NOTIFY') {
    self.registration.showNotification(e.data.title, {
      body: e.data.body,
      tag: e.data.tag || 'sf',
      renotify: true,
      vibrate: [200, 100, 200],
      icon: e.data.icon || ''
    });
  }
});
self.addEventListener('notificationclick', e => {
  e.notification.close();
  e.waitUntil(clients.matchAll({type:'window'}).then(cs => {
    if (cs.length) return cs[0].focus();
    return clients.openWindow('/');
  }));
});
  `;

  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);

  navigator.serviceWorker.register(swUrl, {scope:'/'})
    .then(reg => {
      window._swReg = reg;
      console.log('[ScalaFest] SW registrado');

      // Instalar prompt PWA
      window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        window._installPrompt = e;
        window.dispatchEvent(new Event('sf-instalavel'));
      });
    })
    .catch(err => console.log('[ScalaFest] SW erro:', err));
})();

// Disparar notificação via SW (funciona com aba em background no Android)
window.sfNotify = function(title, body, tag) {
  if (Notification.permission !== 'granted') return;
  // Tentar via SW primeiro (melhor suporte mobile)
  if (window._swReg && window._swReg.active) {
    window._swReg.active.postMessage({type:'NOTIFY', title, body, tag: tag||'sf'});
  } else {
    try { new Notification(title, {body}); } catch(e) {}
  }
};
